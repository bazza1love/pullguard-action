# WHY: GitHub Marketplace Action for one-line PullGuard setup.
# Free tier (14 analyzers) works with no license key.
# Pro (42 analyzers / 1 repo) / Team (all 43 / 10 repos) / Enterprise (unlimited, contact sales) unlocked via PULLGUARD_LICENSE_KEY secret.
#
# Usage:
#   - uses: pullguard-dev/pullguard-action@v1
#
# With Pro/Team/Enterprise:
#   - uses: pullguard-dev/pullguard-action@v1
#     with:
#       license-key: ${{ secrets.PULLGUARD_LICENSE_KEY }}

name: 'PullGuard Code Scanner'
description: 'Code quality, security & compliance on every PR. 43 analyzers, N-hop taint tracking, SOC 2 evidence, cost estimation.'
author: 'PullGuard'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  license-key:
    description: 'PullGuard license key — unlocks Pro (42 of 43 analyzers; 1 repo), Team (all 43 incl. custom-rules + SOC 2; 10 repos), or Enterprise (all 43; unlimited repos + SSO + SLA — contact sales). Free tier (14 analyzers: core + dangerous-files + repo-hygiene) works without a key.'
    required: false
    default: ''
  fail-on-severity:
    description: 'Fail the workflow if findings at this severity or above exist. Options: info, minor, moderate, major, critical. Default: empty (never fail).'
    required: false
    default: ''
  hourly-rate:
    description: 'Developer hourly rate (USD) for cost estimation. Default: 150 USD.'
    required: false
    default: '150'
  config:
    description: 'Path to .driftrc.yml configuration file (relative to repo root).'
    required: false
    default: ''
  path:
    description: 'Path to scan (relative to repo root). Default: entire repo.'
    required: false
    default: '.'
  report-to-app:
    description: 'When true, POST the scan report to the PullGuard GitHub App backend (/api/app/report) so findings appear as native Check Run annotations on the PR Files-changed view. Requires the PullGuard App to be installed on the repo. Default: false (backwards-compatible; Step Summary + PR comment still render).'
    required: false
    default: 'false'
  image-pin:
    description: 'Which scanner image the action runs. Default `1` — the moving major-line tag that always resolves to the newest stable v1.x.y RELEASE (re-pointed only when a signed release is cut, never per-merge), so scans stay current with security improvements yet reproducible. Set `latest` for the bleeding-edge image rebuilt on every merge to main. Pin an exact release tag (`v1.0.0`) or a `sha256:<hex>` digest to freeze one version for change-controlled / air-gapped environments. SHA tags (e.g. `4fdfc1a`) are retained 7 days; release tags `v[0-9]+.[0-9]+.[0-9]+` are preserved forever and the `1` / `1.0` lines re-point to them (ADR-0054 Phase A / ADR-0066). Examples: `image-pin: 1`, `image-pin: latest`, `image-pin: v1.0.0`, `image-pin: sha256:4ab06b5dde376477c9747406da72f6bb80ff471490a5af200d7ff3943f26355e`.'
    required: false
    default: '1'

outputs:
  score:
    description: 'Drift score (0-100, lower is better)'
    value: ${{ steps.scan.outputs.score }}
  grade:
    description: 'Drift grade (A-F)'
    value: ${{ steps.scan.outputs.grade }}
  findings:
    description: 'Total finding count'
    value: ${{ steps.scan.outputs.findings }}

runs:
  using: 'composite'
  steps:
    - name: Run PullGuard analysis
      id: scan
      shell: bash
      env:
        PULLGUARD_LICENSE_KEY: ${{ inputs.license-key }}
        PULLGUARD_FAIL_SEVERITY: ${{ inputs.fail-on-severity }}
        PULLGUARD_HOURLY_RATE: ${{ inputs.hourly-rate }}
        PULLGUARD_CONFIG: ${{ inputs.config }}
        PULLGUARD_SCAN_PATH: ${{ inputs.path }}
        PULLGUARD_REPORT_TO_APP: ${{ inputs.report-to-app }}
        PULLGUARD_IMAGE_PIN: ${{ inputs.image-pin }}
      # WHY: Pull and run the Docker image directly. The entrypoint handles
      # everything: scan, step summary, PR comment, severity threshold, outputs.
      # Using docker run instead of container: directive gives us control over
      # env var mapping and works as a composite action step.
      run: |
        # WHY (ADR-0054 Phase A + ADR-0055 + ADR-0066): resolve the image
        # reference from the `image-pin` input. Default `1` = the moving
        # major-line tag → newest signed v1.x.y RELEASE (re-pointed only on a
        # release cut, NOT per-merge `:latest`), so set-and-forget customers
        # stay current with security improvements yet get reproducible scans.
        # SHA-tag / release-tag pinning protects against supply-chain risk
        # (red-team Finding 6.2 partial closure). Digest-pin (`sha256:...`)
        # gives the strongest cryptographic guarantee.
        #
        # Input format (validated by the case statement below). `:-1` matches
        # action.yml `default: '1'`, so an omitted OR empty input both resolve
        # to the stable channel — no split-brain between the two defaults:
        #   - empty / "1"              → :1       (stable major line, default)
        #   - "latest"                 → :latest  (per-merge bleeding edge)
        #   - "sha256:<64-hex>"        → @sha256:<64-hex>  (digest pin)
        #   - anything else (alnum + . / - / _) → :<value>  (tag pin, e.g. v1.0.0)
        #
        # Anything containing shell-special chars rejects with exit 1 to
        # prevent malicious workflow inputs from injecting flags into the
        # `docker pull` / `docker run` commands.
        IMAGE_PIN_INPUT="${PULLGUARD_IMAGE_PIN:-1}"
        if [ "$IMAGE_PIN_INPUT" = "latest" ]; then
          IMAGE_REF="ghcr.io/pullguard-dev/pullguard:latest"
        elif [[ "$IMAGE_PIN_INPUT" =~ ^sha256:[a-f0-9]{64}$ ]]; then
          IMAGE_REF="ghcr.io/pullguard-dev/pullguard@${IMAGE_PIN_INPUT}"
        elif [[ "$IMAGE_PIN_INPUT" =~ ^[A-Za-z0-9._-]+$ ]]; then
          IMAGE_REF="ghcr.io/pullguard-dev/pullguard:${IMAGE_PIN_INPUT}"
        else
          echo "::error::Invalid image-pin input: '${IMAGE_PIN_INPUT}'. Must be '1' (stable major line), 'latest', a release/SHA tag like 'v1.0.0' or '4fdfc1a', or a 'sha256:<hex>' digest." >&2
          exit 1
        fi
        echo "PullGuard image: ${IMAGE_REF}"
        docker pull "${IMAGE_REF}"

        # WHY: Copy the GitHub event payload into the workspace so the
        # container can read it. The runner's $GITHUB_EVENT_PATH lives on
        # the HOST filesystem (e.g. /home/runner/work/_temp/...); the
        # container only sees the bind-mounted workspace. Without this copy,
        # entrypoint.js cannot determine the PR number → skips the PR
        # comment entirely. Caught by E2E: PR #4 merged clean but the
        # fixture-repo scan logged "PR comment skipped — could not read
        # event payload: ENOENT '/workspace/.github-event.json'".
        if [ -n "${GITHUB_EVENT_PATH:-}" ] && [ -f "${GITHUB_EVENT_PATH}" ]; then
          cp "${GITHUB_EVENT_PATH}" "${{ github.workspace }}/.github-event.json"
        fi

        docker run --rm \
          -v "${{ github.workspace }}:/workspace" \
          -e GITHUB_TOKEN="${{ github.token }}" \
          -e GITHUB_REPOSITORY="${{ github.repository }}" \
          -e GITHUB_EVENT_NAME="${{ github.event_name }}" \
          -e GITHUB_EVENT_PATH="/workspace/.github-event.json" \
          -e GITHUB_SHA="${{ github.sha }}" \
          -e GITHUB_STEP_SUMMARY="/workspace/.step-summary.md" \
          -e GITHUB_OUTPUT="/workspace/.github-output" \
          -e GITHUB_WORKSPACE="/workspace" \
          -e PULLGUARD_LICENSE_KEY="${PULLGUARD_LICENSE_KEY}" \
          -e PULLGUARD_FAIL_SEVERITY="${PULLGUARD_FAIL_SEVERITY}" \
          -e PULLGUARD_HOURLY_RATE="${PULLGUARD_HOURLY_RATE}" \
          -e PULLGUARD_CONFIG="${PULLGUARD_CONFIG}" \
          -e PULLGUARD_SCAN_PATH="${PULLGUARD_SCAN_PATH}" \
          -e PULLGUARD_REPORT_TO_APP="${PULLGUARD_REPORT_TO_APP}" \
          "${IMAGE_REF}"

        # WHY: Copy outputs from container-written files to actual GitHub paths
        if [ -f "${{ github.workspace }}/.step-summary.md" ]; then
          cat "${{ github.workspace }}/.step-summary.md" >> "$GITHUB_STEP_SUMMARY"
        fi
        if [ -f "${{ github.workspace }}/.github-output" ]; then
          cat "${{ github.workspace }}/.github-output" >> "$GITHUB_OUTPUT"
        fi

    - name: Upload report artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pullguard-report
        # WHY: The entrypoint writes pullguard-report.{json,md} inside
        # GITHUB_WORKSPACE (see entrypoint.js REPORT_FILE). The old
        # drift-report.* paths were a rebrand-era leftover — upload-artifact
        # silently skipped with "No files were found" for every customer
        # scan. No artifact appeared on the workflow run page.
        path: |
          pullguard-report.json
          pullguard-report.md
        retention-days: 30
        if-no-files-found: ignore
